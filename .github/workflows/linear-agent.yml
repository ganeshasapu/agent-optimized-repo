name: Linear Agent

on:
  repository_dispatch:
    types: [linear-ticket]

env:
  LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
  LINEAR_TEAM_ID: ${{ vars.LINEAR_TEAM_ID }}
  LINEAR_STATUS_IN_REVIEW: ${{ vars.LINEAR_STATUS_IN_REVIEW }}

jobs:
  agent:
    name: Execute Linear Ticket
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch full ticket from Linear
        id: ticket
        run: |
          ISSUE_ID="${{ github.event.client_payload.issue_id }}"
          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"

          PAYLOAD=$(python3 -c "import json; print(json.dumps({'query': 'query { issue(id: \"'\"$ISSUE_ID\"'\") { id identifier title description priority state { name } labels { nodes { name } } comments { nodes { body user { name } } } } }'}))")

          RESPONSE=$(curl -s -S -X POST "https://api.linear.app/graphql" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          TICKET_JSON=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)['data']['issue']
          print(json.dumps(data, indent=2))
          ")
          echo "$TICKET_JSON" > /tmp/ticket.json

          IDENTIFIER=$(echo "$TICKET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['identifier'])")
          TITLE=$(echo "$TICKET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
          echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          # Pre-compute the branch name so we don't need the agent to tell us
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | head -c 40)
          BRANCH="linear/${IDENTIFIER}-${SLUG}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Branch will be: $BRANCH"

      - name: Build agent prompt
        run: |
          bash scripts/build-agent-prompt.sh /tmp/ticket.json > /tmp/agent-prompt.txt
          echo "Prompt size: $(wc -c < /tmp/agent-prompt.txt) bytes"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run Claude agent
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Run agent — pass prompt via stdin, get JSON output for follow-ups
          cat /tmp/agent-prompt.txt | claude -p - \
            --allowedTools "Read,Edit,Write,Bash,Glob,Grep" \
            --output-format json \
            > /tmp/agent-output.json 2>&1 || true

          echo "Agent output: $(wc -c < /tmp/agent-output.json) bytes"

      - name: Check results and push
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.ticket.outputs.branch }}"
          IDENTIFIER="${{ steps.ticket.outputs.identifier }}"
          TITLE="${{ steps.ticket.outputs.title }}"

          # Check if the agent created the branch with commits
          if git rev-parse --verify "$BRANCH" >/dev/null 2>&1; then
            AHEAD=$(git rev-list --count main.."$BRANCH" 2>/dev/null || echo "0")
            echo "Branch $BRANCH exists with $AHEAD commits ahead of main"
          else
            echo "Branch $BRANCH was not created by the agent."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            # Save agent output as summary
            SUMMARY=$(tail -c 300 /tmp/agent-output.txt | tr '\n' ' ' | head -c 200)
            echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$AHEAD" == "0" ]]; then
            echo "Branch exists but has no new commits."
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "summary=Agent created branch but made no changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Force-push to handle existing branches from previous runs
          git push origin "$BRANCH" --force-with-lease 2>/dev/null || git push origin "$BRANCH" --force

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json url --jq '.[0].url' 2>/dev/null || echo "")

          if [[ -n "$EXISTING_PR" ]]; then
            echo "PR already exists: $EXISTING_PR"
            PR_URL="$EXISTING_PR"
          else
            PR_BODY="## Linear Ticket
          [${IDENTIFIER}](https://linear.app/issue/${IDENTIFIER})

          ---
          *Automated by Linear Agent workflow*"

            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "${IDENTIFIER}: ${TITLE}" \
              --body "$PR_BODY")
          fi

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Update Linear ticket
        if: always()
        run: |
          source scripts/lib/linear.sh
          ISSUE_ID="${{ steps.ticket.outputs.issue_id }}"
          PR_URL="${{ steps.pr.outputs.pr_url }}"
          STATUS="${{ steps.pr.outputs.status }}"

          if [[ -z "$ISSUE_ID" ]]; then
            echo "No issue ID, skipping Linear update"
            exit 0
          fi

          if [[ "$STATUS" == "success" && -n "$PR_URL" ]]; then
            if [[ -n "$LINEAR_STATUS_IN_REVIEW" ]]; then
              linear_update_issue_status "$ISSUE_ID" "$LINEAR_STATUS_IN_REVIEW" || true
            fi
            linear_add_comment "$ISSUE_ID" "PR created: ${PR_URL}" || true
          elif [[ "${{ job.status }}" == "cancelled" ]]; then
            linear_add_comment "$ISSUE_ID" "Agent timed out after 30 minutes. Consider breaking this ticket into smaller pieces." || true
          else
            linear_add_comment "$ISSUE_ID" "Agent was unable to complete this ticket. Check the GitHub Actions log for details." || true
          fi

      - name: Create follow-up tickets
        if: steps.pr.outputs.status == 'success'
        run: |
          source scripts/lib/linear.sh
          IDENTIFIER="${{ steps.ticket.outputs.identifier }}"

          # Extract follow-ups from the agent's JSON output
          python3 /dev/stdin << 'PYEOF'
          import json, re, subprocess, os

          # The JSON output from claude --output-format json contains a "result" field with the text
          try:
              data = json.load(open("/tmp/agent-output.json"))
              # claude --output-format json returns {"type":"result","result":"...text..."}
              text = data.get("result", "") if isinstance(data, dict) else str(data)
          except (json.JSONDecodeError, FileNotFoundError):
              print("Could not read agent JSON output, skipping follow-ups")
              exit(0)

          # Look for follow_ups in the text
          fence = "```"
          pattern = fence + r'json\s*(\{.*?\})\s*' + fence
          match = re.search(pattern, text, re.DOTALL)

          follow_ups = []
          if match:
              try:
                  result = json.loads(match.group(1))
                  follow_ups = result.get("follow_ups", [])[:5]
              except json.JSONDecodeError:
                  pass

          if not follow_ups:
              print("No follow-up tickets to create")
              exit(0)

          team_id = os.environ.get("LINEAR_TEAM_ID", "")
          identifier = os.environ.get("IDENTIFIER", "")
          if not team_id:
              print("LINEAR_TEAM_ID not set, skipping")
              exit(0)

          for fu in follow_ups:
              title = fu.get("title", "")
              desc = fu.get("description", "")
              full_desc = f"Discovered while working on {identifier}.\n\n{desc}"
              print(f"Creating follow-up: {title}")
              subprocess.run(
                  ["bash", "-c", f'source scripts/lib/linear.sh && linear_create_issue "{team_id}" "{title}" "{full_desc}" ""'],
                  check=False,
                  env={**os.environ, "IDENTIFIER": identifier}
              )
          PYEOF
